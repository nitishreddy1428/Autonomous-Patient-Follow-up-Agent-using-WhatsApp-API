<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PatientAgent</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }

        .logo {
            justify-content: center;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="login-card glass">
        <div class="logo">
            <i class="fa-solid fa-heart-pulse"></i>
            <span>PatientAgent</span>
        </div>
        <h2 style="margin-bottom: 0.5rem;">Doctor Login</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Welcome back! Please login to your
            dashboard.</p>

        <form id="loginForm">
            <div class="form-group" style="text-align: left;">
                <label>Username</label>
                <input type="text" id="username" placeholder="dr_nitish" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 1rem;">Login to
                Dashboard</button>
        </form>

        <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html"
                style="color: var(--accent); text-decoration: none; font-weight: 600;">Sign up</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('doctor', JSON.stringify(data.doctor));
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Connection error. Is the backend running?');
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('doctor')) {
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
