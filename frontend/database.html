<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatientAgent | Database Explorer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Auth Guard
        const doctorData = localStorage.getItem('doctor');
        if (!doctorData) {
            window.location.href = 'login.html';
        }
        const doctor = JSON.parse(doctorData);
    </script>
    <style>
        .db-stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .db-stat {
            padding: 1.25rem;
            text-align: center;
        }

        .db-stat .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .db-stat .number {
            font-size: 2rem;
            font-weight: 700;
        }

        .tab-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .db-table {
            width: 100%;
            border-collapse: collapse;
        }

        .db-table th {
            text-align: left;
            padding: 1rem;
            color: var(--accent);
            border-bottom: 2px solid var(--primary);
            background: rgba(0, 0, 0, 0.2);
        }

        .db-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .pill {
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .pill-green {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .pill-red {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
    </style>
</head>

<body data-theme="dark">
    <div class="container">
        <header class="glass"
            style="padding: 1rem 2rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <div style="display: flex; flex-direction: column;">
                    <span style="line-height: 1;">PatientAgent</span>
                    <small style="font-size: 0.65rem; color: var(--text-muted);">DATABASE EXPLORER</small>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div class="theme-toggle" id="themeToggle"><i class="fa-solid fa-moon"></i></div>
                <button class="btn btn-ghost" onclick="window.location.href='index.html'"><i
                        class="fa-solid fa-arrow-left"></i> Dashboard</button>
                <button class="btn btn-ghost" style="color: var(--danger);" onclick="logout()"><i
                        class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <section class="db-stats-row">
            <div class="db-stat glass">
                <div class="label">Total Records</div>
                <div class="number" id="count-total" style="color: var(--primary-light);">0</div>
            </div>
            <div class="db-stat glass">
                <div class="label">Responses</div>
                <div class="number" id="count-responses" style="color: var(--accent);">0</div>
            </div>
            <div class="db-stat glass">
                <div class="label">Alerts</div>
                <div class="number" id="count-alerts" style="color: var(--warning);">0</div>
            </div>
        </section>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('patients')" id="tab-patients">Patients</button>
                <button class="tab-btn" onclick="switchTab('responses')" id="tab-responses">Responses</button>
                <button class="tab-btn" onclick="switchTab('alerts')" id="tab-alerts">Alerts</button>
            </div>
            <button class="btn" onclick="refreshAll()"><i class="fa-solid fa-arrows-rotate"></i> Refresh Data</button>
        </div>

        <div class="glass" style="overflow: hidden;">
            <div id="table-content"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let currentTab = 'patients';
        let data = { patients: [], responses: [], alerts: [] };

        document.addEventListener('DOMContentLoaded', () => {
            // Theme Initialization
            const theme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', theme);
            document.querySelector('#themeToggle i').className = theme === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';

            document.getElementById('themeToggle').addEventListener('click', () => {
                const now = document.body.getAttribute('data-theme');
                const next = now === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                document.querySelector('#themeToggle i').className = next === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            });

            refreshAll();
        });

        async function refreshAll() {
            try {
                const [p, r, a, s] = await Promise.all([
                    fetch(`${API_URL}/db/patients`).then(r => r.json()),
                    fetch(`${API_URL}/db/responses`).then(r => r.json()),
                    fetch(`${API_URL}/db/alerts`).then(r => r.json()),
                    fetch(`${API_URL}/stats`).then(r => r.json())
                ]);
                data = { patients: p, responses: r, alerts: a };
                document.getElementById('count-total').textContent = s.total_patients;
                document.getElementById('count-responses').textContent = s.total_responses;
                document.getElementById('count-alerts').textContent = s.total_alerts;
                renderTable();
            } catch (err) { console.error(err); }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('table-content');
            const items = data[currentTab];

            if (!items || items.length === 0) {
                container.innerHTML = '<div style="padding: 4rem; text-align: center; color: var(--text-muted);">No records found matching this category.</div>';
                return;
            }

            let html = '<table class="db-table"><thead><tr>';
            if (currentTab === 'patients') {
                html += '<th>ID</th><th>Name</th><th>Phone</th><th>Status</th><th>Risk</th></tr></thead><tbody>';
                html += items.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.phone}</td><td>${p.status}</td><td>${p.risk_score}%</td></tr>`).join('');
            } else if (currentTab === 'responses') {
                html += '<th>ID</th><th>Patient</th><th>Pain</th><th>Temp</th><th>Sentiment</th></tr></thead><tbody>';
                html += items.map(r => `<tr><td>${r.id}</td><td>${r.patient_name}</td><td>${r.pain_level}/10</td><td>${r.temperature}°C</td><td>${r.sentiment}</td></tr>`).join('');
            } else {
                html += '<th>ID</th><th>Patient</th><th>Severity</th><th>Message</th></tr></thead><tbody>';
                html += items.map(a => `<tr><td>${a.id}</td><td>${a.patient_name}</td><td>${a.severity}</td><td>${a.message}</td></tr>`).join('');
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function logout() {
            localStorage.removeItem('doctor');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
